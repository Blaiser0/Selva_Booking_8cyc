<rect x="16" y="160" width="358" height="150" rx="16" fill="#F3F1EA"/>
<text x="28.0" y="188.0" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#1A2E1A">Eco Lodge Selva Verde</text>
