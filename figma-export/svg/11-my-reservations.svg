<text x="28.0" y="394.0" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" fill="#2C4A4A">Habitacion: Suite Selva</text>
<text x="28.0" y="416.0" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="400" fill="#2C4A4A">01/08/2026 - 04/08/2026</text>
<text x="28.0" y="440.0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#2E5E3E">S/ 600</text>
