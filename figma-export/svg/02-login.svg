<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="390px" height="844px" viewBox="0 0 390 844"
     preserveAspectRatio="xMidYMid meet" fill="none">
  <title>Inicio de sesion</title>
  <defs>
    <linearGradient id="gradDrawer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E5E3E"/>
      <stop offset="100%" stop-color="#1E3D2A"/>
    </linearGradient>
    <linearGradient id="gradHero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3D2A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
    <clipPath id="clipFrame">
      <rect x="0" y="0" width="390" height="844"/>
    </clipPath>
    <clipPath id="clipLogo">
      <rect x="45" y="318" width="300" height="128" rx="8"/>
    </clipPath>
  </defs>
  <g id="screen" clip-path="url(#clipFrame)">
    <rect id="background" x="0" y="0" width="390" height="844" fill="#FAF9F6"/>
    <g id="status-bar">
      <text x="24.0" y="20.0" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#2C4A4A">9:41</text>
      <text x="330.0" y="20.0" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#2C4A4A" text-anchor="end">100%</text>
    </g>
    <g id="logo-placeholder">
      <rect x="85" y="105" width="220" height="90" rx="12" fill="#F3F1EA" stroke="#2E5E3E" stroke-width="1.5"/>
      <circle cx="195" cy="132" r="24" fill="#2E5E3E" fill-opacity="0.15"/>
      <text x="195.0" y="156.0" font-family="Georgia, Times New Roman, serif" font-size="16" font-weight="700" fill="#2E5E3E" text-anchor="middle">SELVA BOOKING</text>
      <text x="195.0" y="176.0" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="400" fill="#2C4A4A" text-anchor="middle">Reservas ecologicas</text>
    </g>
<text x="195.0" y="250.0" font-family="Georgia, Times New Roman, serif" font-size="24" font-weight="700" fill="#2E5E3E" text-anchor="middle">Bienvenido</text>
<text x="195.0" y="276.0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#2C4A4A" text-anchor="middle">Inicia sesion para continuar</text>
    <g id="field-correo-electronico">
      <text x="28.0" y="308.0" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#2E5E3E">Correo electronico</text>
      <rect x="24" y="312" width="342" height="48" rx="12" fill="#FAF9F6" stroke="#8B5E3C" stroke-width="1.2"/>
      <text x="36.0" y="338.0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#2C4A4A" dominant-baseline="middle">tu@email.com</text>
    </g>
    <g id="field-contrasena">
      <text x="28.0" y="378.0" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#2E5E3E">Contrasena</text>
      <rect x="24" y="382" width="342" height="48" rx="12" fill="#FAF9F6" stroke="#8B5E3C" stroke-width="1.2"/>
      <text x="36.0" y="408.0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#2C4A4A" dominant-baseline="middle">********</text><circle cx="350" cy="404" r="7" stroke="#2E5E3E" stroke-width="1.2" fill="#FAF9F6"/>
    </g>
<text x="362.0" y="450.0" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" fill="#2E5E3E" text-anchor="end">Olvidaste tu contrasena?</text>
    <g id="btn-primary">
      <rect x="24" y="480" width="342" height="48" rx="12" fill="#2E5E3E"/>
      <text x="195.0" y="504.0" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#FAF9F6" text-anchor="middle" dominant-baseline="middle">Iniciar sesion</text>
    </g>
<text x="195.0" y="560.0" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" fill="#2E5E3E" text-anchor="middle">No tienes cuenta? Registrate</text>
  </g>
</svg>