<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="390px" height="844px" viewBox="0 0 390 844"
     preserveAspectRatio="xMidYMid meet" fill="none">
  <title>Registro</title>
  <defs>
    <linearGradient id="gradDrawer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E5E3E"/>
      <stop offset="100%" stop-color="#1E3D2A"/>
    </linearGradient>
    <linearGradient id="gradHero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3D2A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
    <clipPath id="clipFrame">
      <rect x="0" y="0" width="390" height="844"/>
    </clipPath>
    <clipPath id="clipLogo">
      <rect x="45" y="318" width="300" height="128" rx="8"/>
    </clipPath>
  </defs>
  <g id="screen" clip-path="url(#clipFrame)">
    <rect id="background" x="0" y="0" width="390" height="844" fill="#FAF9F6"/>
    <g id="status-bar">
      <text x="24.0" y="20.0" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#2C4A4A">9:41</text>
      <text x="330.0" y="20.0" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#2C4A4A" text-anchor="end">100%</text>
    </g>
    <g id="logo-placeholder">
      <rect x="85" y="75" width="220" height="90" rx="12" fill="#F3F1EA" stroke="#2E5E3E" stroke-width="1.5"/>
      <circle cx="195" cy="102" r="24" fill="#2E5E3E" fill-opacity="0.15"/>
      <text x="195.0" y="126.0" font-family="Georgia, Times New Roman, serif" font-size="16" font-weight="700" fill="#2E5E3E" text-anchor="middle">SELVA BOOKING</text>
      <text x="195.0" y="146.0" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="400" fill="#2C4A4A" text-anchor="middle">Reservas ecologicas</text>
    </g>
<text x="195.0" y="210.0" font-family="Georgia, Times New Roman, serif" font-size="24" font-weight="700" fill="#2E5E3E" text-anchor="middle">Crear cuenta</text>
    <g id="field-nombre-completo">
      <text x="28.0" y="258.0" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#2E5E3E">Nombre completo</text>
      <rect x="24" y="262" width="342" height="48" rx="12" fill="#FAF9F6" stroke="#8B5E3C" stroke-width="1.2"/>
      
    </g>
    <g id="field-correo-electronico">
      <text x="28.0" y="328.0" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#2E5E3E">Correo electronico</text>
      <rect x="24" y="332" width="342" height="48" rx="12" fill="#FAF9F6" stroke="#8B5E3C" stroke-width="1.2"/>
      
    </g>
    <g id="field-contrasena">
      <text x="28.0" y="398.0" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#2E5E3E">Contrasena</text>
      <rect x="24" y="402" width="342" height="48" rx="12" fill="#FAF9F6" stroke="#8B5E3C" stroke-width="1.2"/>
      <circle cx="350" cy="424" r="7" stroke="#2E5E3E" stroke-width="1.2" fill="#FAF9F6"/>
    </g>
    <g id="field-confirmar-contrasena">
      <text x="28.0" y="468.0" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#2E5E3E">Confirmar contrasena</text>
      <rect x="24" y="472" width="342" height="48" rx="12" fill="#FAF9F6" stroke="#8B5E3C" stroke-width="1.2"/>
      <circle cx="350" cy="494" r="7" stroke="#2E5E3E" stroke-width="1.2" fill="#FAF9F6"/>
    </g>
    <g id="btn-primary">
      <rect x="24" y="540" width="342" height="48" rx="12" fill="#2E5E3E"/>
      <text x="195.0" y="564.0" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#FAF9F6" text-anchor="middle" dominant-baseline="middle">Registrarse</text>
    </g>
<text x="195.0" y="620.0" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" fill="#2E5E3E" text-anchor="middle">Ya tienes cuenta? Inicia sesion</text>
  </g>
</svg>