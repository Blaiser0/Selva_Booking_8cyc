<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="390px" height="844px" viewBox="0 0 390 844"
     preserveAspectRatio="xMidYMid meet" fill="none">
  <title>Soporte y Ayuda</title>
  <defs>
    <linearGradient id="gradDrawer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E5E3E"/>
      <stop offset="100%" stop-color="#1E3D2A"/>
    </linearGradient>
    <linearGradient id="gradHero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3D2A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
    <clipPath id="clipFrame">
      <rect x="0" y="0" width="390" height="844"/>
    </clipPath>
    <clipPath id="clipLogo">
      <rect x="45" y="318" width="300" height="128" rx="8"/>
    </clipPath>
  </defs>
  <g id="screen" clip-path="url(#clipFrame)">
    <rect id="background" x="0" y="0" width="390" height="844" fill="#FAF9F6"/>
    <g id="status-bar">
      <text x="24.0" y="20.0" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#2C4A4A">9:41</text>
      <text x="330.0" y="20.0" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#2C4A4A" text-anchor="end">100%</text>
    </g>
    <g id="top-bar">
      <rect x="0" y="36" width="390" height="56" fill="#FAF9F6"/>
      <line x1="0" y1="92" x2="390" y2="92" stroke="#F3F1EA" stroke-width="1"/>
            <g id="menu-icon" transform="translate(16,48)">
        <rect x="0" y="2" width="18" height="2.5" rx="1.2" fill="#2E5E3E"/>
        <rect x="0" y="8" width="18" height="2.5" rx="1.2" fill="#2E5E3E"/>
        <rect x="0" y="14" width="18" height="2.5" rx="1.2" fill="#2E5E3E"/>
      </g>
      <text x="48.0" y="68.0" font-family="Georgia, Times New Roman, serif" font-size="18" font-weight="700" fill="#2E5E3E">Soporte y Ayuda</text>
    </g>
<text x="20.0" y="120.0" font-family="Georgia, Times New Roman, serif" font-size="22" font-weight="700" fill="#2E5E3E">Necesitas ayuda?</text>
<text x="20.0" y="148.0" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" fill="#2C4A4A">Estamos aqui para ayudarte con reservas y tu cuenta.</text>
<rect x="16" y="168" width="358" height="110" rx="16" fill="#F3F1EA"/>
<text x="32.0" y="196.0" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#2E5E3E">Preguntas frecuentes</text>
<text x="32.0" y="222.0" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="400" fill="#2C4A4A">- Como reservo un hotel?</text>
<text x="32.0" y="244.0" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="400" fill="#2C4A4A">- Puedo cancelar?</text>
<text x="32.0" y="266.0" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="400" fill="#2C4A4A">- Olvide mi contrasena?</text>
<rect x="16" y="296" width="358" height="100" rx="16" fill="#F3F1EA"/>
<text x="32.0" y="324.0" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#2E5E3E">Contacto</text>
<text x="32.0" y="350.0" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="400" fill="#2C4A4A">soporte@selvabooking.com</text>
<rect x="16" y="414" width="358" height="100" rx="16" fill="#F3F1EA"/>
<text x="32.0" y="442.0" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#2E5E3E">Reportar un problema</text>
<text x="32.0" y="468.0" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="400" fill="#2C4A4A">Describe el error y envialo a soporte</text>
