<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="390px" height="844px" viewBox="0 0 390 844"
     preserveAspectRatio="xMidYMid meet" fill="none">
  <title>Recuperar contrasena</title>
  <defs>
    <linearGradient id="gradDrawer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E5E3E"/>
      <stop offset="100%" stop-color="#1E3D2A"/>
    </linearGradient>
    <linearGradient id="gradHero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3D2A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
    <clipPath id="clipFrame">
      <rect x="0" y="0" width="390" height="844"/>
    </clipPath>
    <clipPath id="clipLogo">
      <rect x="45" y="318" width="300" height="128" rx="8"/>
    </clipPath>
  </defs>
  <g id="screen" clip-path="url(#clipFrame)">
    <rect id="background" x="0" y="0" width="390" height="844" fill="#FAF9F6"/>
    <g id="status-bar">
      <text x="24.0" y="20.0" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#2C4A4A">9:41</text>
      <text x="330.0" y="20.0" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#2C4A4A" text-anchor="end">100%</text>
    </g>
    <g id="top-bar">
      <rect x="0" y="36" width="390" height="56" fill="#FAF9F6"/>
      <line x1="0" y1="92" x2="390" y2="92" stroke="#F3F1EA" stroke-width="1"/>
            <g id="back-icon">
        <path d="M30 72 L20 72 L26 66 M20 72 L26 78" stroke="#2E5E3E" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="56.0" y="68.0" font-family="Georgia, Times New Roman, serif" font-size="18" font-weight="700" fill="#2E5E3E">Recuperar contrasena</text>
    </g>
<text x="195.0" y="150.0" font-family="Georgia, Times New Roman, serif" font-size="22" font-weight="700" fill="#2E5E3E" text-anchor="middle">Restablecer contrasena</text>
<text x="195.0" y="190.0" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" fill="#2C4A4A" text-anchor="middle">Te enviaremos un enlace a tu correo</text>
    <g id="field-correo-electronico">
      <text x="28.0" y="248.0" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#2E5E3E">Correo electronico</text>
      <rect x="24" y="252" width="342" height="48" rx="12" fill="#FAF9F6" stroke="#8B5E3C" stroke-width="1.2"/>
      <text x="36.0" y="278.0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#2C4A4A" dominant-baseline="middle">tu@email.com</text>
    </g>
    <g id="btn-primary">
