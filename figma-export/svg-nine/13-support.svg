<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="390" height="844" viewBox="0 0 390 844" preserveAspectRatio="xMidYMid meet">
  <title>Soporte y Ayuda</title>
  <defs>
    <linearGradient id="gradDrawer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E5E3E"/>
      <stop offset="100%" stop-color="#1E3D2A"/>
    </linearGradient>
    <linearGradient id="gradHero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
    <clipPath id="clipFrame"><rect width="390" height="844"/></clipPath>
    <filter id="shadow-sm" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-md" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <g id="screen">
<rect x="0" y="0" width="390" height="844" rx="0" fill="#FAF9F6"/>
<g id="top-bar">
  <rect x="0" y="0" width="390" height="64" rx="0" fill="#FAF9F6"/>
  <g transform="translate(16,20)">
  <rect x="0" y="0" width="18" height="2.5" rx="1.2" fill="#2E5E3E"/>
  <rect x="0" y="7" width="18" height="2.5" rx="1.2" fill="#2E5E3E"/>
  <rect x="0" y="14" width="18" height="2.5" rx="1.2" fill="#2E5E3E"/>
</g>
  <text x="56.0" y="29.6" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#2E5E3E">Soporte y Ayuda</text>
</g>
<text x="16.0" y="88.4" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" fill="#2E5E3E">Necesitas ayuda?</text>
<text x="16.0" y="120.9" font-family="Inter, Roboto, Arial, sans-serif" font-size="13" font-weight="400" fill="#2C4A4A">Estamos aqui para ayudarte con reservas y tu cuenta.</text>
<g id="faq" filter="url(#shadow-sm)">
  <rect x="16" y="152" width="358" height="110" rx="16" fill="#F3F1EA"/>
  <text x="32.0" y="177.7" font-family="Inter, Roboto, Arial, sans-serif" font-size="15" font-weight="600" fill="#2E5E3E">Preguntas frecuentes</text>
  <text x="32.0" y="202.6" font-family="Inter, Roboto, Arial, sans-serif" font-size="12" font-weight="400" fill="#2C4A4A">- Como reservo un hotel?</text>
  <text x="32.0" y="222.6" font-family="Inter, Roboto, Arial, sans-serif" font-size="12" font-weight="400" fill="#2C4A4A">- Puedo cancelar?</text>
  <text x="32.0" y="242.6" font-family="Inter, Roboto, Arial, sans-serif" font-size="12" font-weight="400" fill="#2C4A4A">- Olvide mi contrasena?</text>
</g>
<g id="contact" filter="url(#shadow-sm)">
  <rect x="16" y="278" width="358" height="100" rx="16" fill="#F3F1EA"/>
  <text x="32.0" y="303.7" font-family="Inter, Roboto, Arial, sans-serif" font-size="15" font-weight="600" fill="#2E5E3E">Contacto</text>
  <text x="32.0" y="328.6" font-family="Inter, Roboto, Arial, sans-serif" font-size="12" font-weight="400" fill="#2C4A4A">soporte@selvabooking.com</text>
  <text x="32.0" y="350.6" font-family="Inter, Roboto, Arial, sans-serif" font-size="12" font-weight="400" fill="#2C4A4A">+51 999 888 777</text>
</g>
<g id="report" filter="url(#shadow-sm)">
  <rect x="16" y="394" width="358" height="100" rx="16" fill="#F3F1EA"/>
  <text x="32.0" y="419.7" font-family="Inter, Roboto, Arial, sans-serif" font-size="15" font-weight="600" fill="#2E5E3E">Reportar un problema</text>
  <text x="32.0" y="444.6" font-family="Inter, Roboto, Arial, sans-serif" font-size="12" font-weight="400" fill="#2C4A4A">Describe el error y envialo a soporte</text>
  <g id="btn-outline-Enviar reporte">
  <rect x="32" y="460" width="326" height="44" rx="12" fill="#FAF9F6" stroke="#2E5E3E" stroke-width="1.2"/>
  <text x="195.0" y="477.3" font-family="Inter, Roboto, Arial, sans-serif" font-size="14" font-weight="600" fill="#2E5E3E" text-anchor="middle">Enviar reporte</text>
</g>
</g>
  </g>
</svg>