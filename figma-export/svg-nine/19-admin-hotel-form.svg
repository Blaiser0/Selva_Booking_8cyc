<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="390" height="844" viewBox="0 0 390 844" preserveAspectRatio="xMidYMid meet">
  <title>Formulario Hotel</title>
  <defs>
    <linearGradient id="gradDrawer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E5E3E"/>
      <stop offset="100%" stop-color="#1E3D2A"/>
    </linearGradient>
    <linearGradient id="gradHero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
    <clipPath id="clipFrame"><rect width="390" height="844"/></clipPath>
    <filter id="shadow-sm" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-md" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <g id="screen">
<rect x="0" y="0" width="390" height="844" rx="0" fill="#FAF9F6"/>
<g id="top-bar">
  <rect x="0" y="0" width="390" height="64" rx="0" fill="#FAF9F6"/>
  <g transform="translate(16,20)">
  <rect x="0" y="0" width="18" height="2.5" rx="1.2" fill="#2E5E3E"/>
  <rect x="0" y="7" width="18" height="2.5" rx="1.2" fill="#2E5E3E"/>
  <rect x="0" y="14" width="18" height="2.5" rx="1.2" fill="#2E5E3E"/>
</g>
  <text x="56.0" y="29.6" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#2E5E3E">Gestion de Hoteles</text>
</g>
<rect width="390" height="844" fill="#000000" fill-opacity="0.45"/>
<g id="hotel-form" filter="url(#shadow-md)">
  <rect x="20" y="120" width="350" height="620" rx="20" fill="#FAF9F6"/>
  <text x="40.0" y="146.8" font-family="Inter, Roboto, Arial, sans-serif" font-size="18" font-weight="700" fill="#2E5E3E">Nuevo hotel</text>
</g>
<g id="field-Nombre">
  <text x="40.0" y="172.6" font-family="Inter, Roboto, Arial, sans-serif" font-size="12" font-weight="500" fill="#2E5E3E">Nombre</text>
  <rect x="36" y="186" width="318" height="44" rx="10" fill="#FAF9F6" stroke="#8B5E3C" stroke-width="1.2"/>
</g>
<g id="field-Ciudad">
  <text x="40.0" y="242.6" font-family="Inter, Roboto, Arial, sans-serif" font-size="12" font-weight="500" fill="#2E5E3E">Ciudad</text>
  <rect x="36" y="256" width="318" height="44" rx="10" fill="#FAF9F6" stroke="#8B5E3C" stroke-width="1.2"/>
</g>
<g id="field-Direccion">
  <text x="40.0" y="312.6" font-family="Inter, Roboto, Arial, sans-serif" font-size="12" font-weight="500" fill="#2E5E3E">Direccion</text>
  <rect x="36" y="326" width="318" height="44" rx="10" fill="#FAF9F6" stroke="#8B5E3C" stroke-width="1.2"/>
</g>
<g id="field-Descripcion">
  <text x="40.0" y="382.6" font-family="Inter, Roboto, Arial, sans-serif" font-size="12" font-weight="500" fill="#2E5E3E">Descripcion</text>
  <rect x="36" y="396" width="318" height="44" rx="10" fill="#FAF9F6" stroke="#8B5E3C" stroke-width="1.2"/>
</g>
<g id="field-Categoria">
  <text x="40.0" y="452.6" font-family="Inter, Roboto, Arial, sans-serif" font-size="12" font-weight="500" fill="#2E5E3E">Categoria</text>
  <rect x="36" y="466" width="318" height="44" rx="10" fill="#FAF9F6" stroke="#8B5E3C" stroke-width="1.2"/>
</g>
<g id="field-Precio minimo">
  <text x="40.0" y="522.6" font-family="Inter, Roboto, Arial, sans-serif" font-size="12" font-weight="500" fill="#2E5E3E">Precio minimo</text>
  <rect x="36" y="536" width="318" height="44" rx="10" fill="#FAF9F6" stroke="#8B5E3C" stroke-width="1.2"/>
</g>
<g id="field-Calificacion">
  <text x="40.0" y="592.6" font-family="Inter, Roboto, Arial, sans-serif" font-size="12" font-weight="500" fill="#2E5E3E">Calificacion</text>
  <rect x="36" y="606" width="318" height="44" rx="10" fill="#FAF9F6" stroke="#8B5E3C" stroke-width="1.2"/>
</g>
<g id="btn-Guardar">
  <rect x="36" y="640" width="318" height="48" rx="12" fill="#2E5E3E"/>
  <text x="195.0" y="659.3" font-family="Inter, Roboto, Arial, sans-serif" font-size="14" font-weight="600" fill="#FAF9F6" text-anchor="middle">Guardar</text>
</g>
<g id="btn-outline-Cancelar">
  <rect x="36" y="700" width="318" height="44" rx="12" fill="#FAF9F6" stroke="#2E5E3E" stroke-width="1.2"/>
  <text x="195.0" y="717.3" font-family="Inter, Roboto, Arial, sans-serif" font-size="14" font-weight="600" fill="#2E5E3E" text-anchor="middle">Cancelar</text>
</g>
  </g>
</svg>