<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="390" height="844" viewBox="0 0 390 844" preserveAspectRatio="xMidYMid meet">
  <title>Perfil</title>
  <defs>
    <linearGradient id="gradDrawer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E5E3E"/>
      <stop offset="100%" stop-color="#1E3D2A"/>
    </linearGradient>
    <linearGradient id="gradHero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
    <clipPath id="clipFrame"><rect width="390" height="844"/></clipPath>
    <filter id="shadow-sm" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-md" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <g id="screen">
<rect x="0" y="0" width="390" height="844" rx="0" fill="#FAF9F6"/>
<g id="top-bar">
  <rect x="0" y="0" width="390" height="64" rx="0" fill="#FAF9F6"/>
  <g transform="translate(16,20)">
  <rect x="0" y="0" width="18" height="2.5" rx="1.2" fill="#2E5E3E"/>
  <rect x="0" y="7" width="18" height="2.5" rx="1.2" fill="#2E5E3E"/>
  <rect x="0" y="14" width="18" height="2.5" rx="1.2" fill="#2E5E3E"/>
</g>
  <text x="56.0" y="29.6" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#2E5E3E">Mi perfil</text>
</g>
<g id="profile-header" filter="url(#shadow-sm)">
  <rect x="16" y="80" width="358" height="230" rx="20" fill="#F3F1EA"/>
  <g id="img-ph">
  <rect x="151" y="100" width="88" height="88" rx="44" fill="#E8EDE9" stroke="#2E5E3E" stroke-width="1"/>
  <line x1="159" y1="108" x2="231" y2="180" stroke="#2E5E3E" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="231" y1="108" x2="159" y2="180" stroke="#2E5E3E" stroke-width="1" stroke-opacity="0.25"/>
  <text x="195.0" y="140.2" font-family="Inter, Roboto, Arial, sans-serif" font-size="11" font-weight="400" fill="#2C4A4A" text-anchor="middle" opacity="0.55">Foto</text>
</g>
  <circle cx="225" cy="168" r="14" fill="#2E5E3E"/>
  <rect x="217" y="160" width="16" height="16" rx="8" fill="#FAF9F6"/>
  <text x="195.0" y="216.4" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" fill="#2E5E3E" text-anchor="middle">Jesus Uceda</text>
  <text x="195.0" y="241.3" font-family="Inter, Roboto, Arial, sans-serif" font-size="14" font-weight="400" fill="#2C4A4A" text-anchor="middle">jesus@selvabooking.com</text>
  <rect x="151" y="256" width="88" height="28" rx="14" fill="#2E5E3E"/>
  <rect x="151" y="256" width="88" height="28" rx="14" fill="#2E5E3E" fill-opacity="0.12"/>
  <text x="195.0" y="264.9" font-family="Inter, Roboto, Arial, sans-serif" font-size="13" font-weight="600" fill="#2E5E3E" text-anchor="middle">Cliente</text>
</g>
<g id="account" filter="url(#shadow-sm)">
  <rect x="16" y="342" width="358" height="200" rx="16" fill="#FAF9F6"/>
  <text x="32.0" y="368.1" font-family="Inter, Roboto, Arial, sans-serif" font-size="16" font-weight="600" fill="#2E5E3E">Informacion de la cuenta</text>
  <text x="32.0" y="399.3" font-family="Inter, Roboto, Arial, sans-serif" font-size="14" font-weight="400" fill="#2C4A4A">Nombre: Jesus Uceda</text>
  <text x="32.0" y="423.3" font-family="Inter, Roboto, Arial, sans-serif" font-size="14" font-weight="400" fill="#2C4A4A">Email: jesus@selvabooking.com</text>
  <text x="32.0" y="447.3" font-family="Inter, Roboto, Arial, sans-serif" font-size="14" font-weight="400" fill="#2C4A4A">Tipo: Cliente</text>
  <g id="btn-outline-Editar nombre">
  <rect x="32" y="472" width="155" height="44" rx="12" fill="#FAF9F6" stroke="#2E5E3E" stroke-width="1.2"/>
  <text x="109.5" y="489.3" font-family="Inter, Roboto, Arial, sans-serif" font-size="14" font-weight="600" fill="#2E5E3E" text-anchor="middle">Editar nombre</text>
</g>
  <g id="btn-Guardar">
  <rect x="199" y="472" width="155" height="48" rx="12" fill="#2E5E3E"/>
  <text x="276.5" y="491.3" font-family="Inter, Roboto, Arial, sans-serif" font-size="14" font-weight="600" fill="#FAF9F6" text-anchor="middle">Guardar</text>
</g>
</g>
<g id="session" filter="url(#shadow-sm)">
  <rect x="16" y="558" width="358" height="108" rx="16" fill="#FAF9F6"/>
  <text x="32.0" y="584.1" font-family="Inter, Roboto, Arial, sans-serif" font-size="16" font-weight="600" fill="#2E5E3E">Sesion</text>
  <g id="btn-outline-Cerrar sesion">
  <rect x="32" y="608" width="326" height="44" rx="12" fill="#FAF9F6" stroke="#2E5E3E" stroke-width="1.2"/>
  <text x="195.0" y="625.3" font-family="Inter, Roboto, Arial, sans-serif" font-size="14" font-weight="600" fill="#2E5E3E" text-anchor="middle">Cerrar sesion</text>
</g>
</g>
  </g>
</svg>