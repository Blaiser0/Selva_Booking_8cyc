<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="390" height="844" viewBox="0 0 390 844" preserveAspectRatio="xMidYMid meet">
  <title>Detalle Reserva Admin</title>
  <defs>
    <linearGradient id="gradDrawer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E5E3E"/>
      <stop offset="100%" stop-color="#1E3D2A"/>
    </linearGradient>
    <linearGradient id="gradHero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
    <clipPath id="clipFrame"><rect width="390" height="844"/></clipPath>
    <filter id="shadow-sm" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-md" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <g id="screen">
<rect x="0" y="0" width="390" height="844" rx="0" fill="#FAF9F6"/>
<g id="top-bar">
  <rect x="0" y="0" width="390" height="64" rx="0" fill="#FAF9F6"/>
  <g transform="translate(16,20)">
  <rect x="0" y="0" width="18" height="2.5" rx="1.2" fill="#2E5E3E"/>
  <rect x="0" y="7" width="18" height="2.5" rx="1.2" fill="#2E5E3E"/>
  <rect x="0" y="14" width="18" height="2.5" rx="1.2" fill="#2E5E3E"/>
</g>
  <text x="56.0" y="29.6" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#2E5E3E">Gestion de Reservas</text>
</g>
<rect width="390" height="844" fill="#000000" fill-opacity="0.45"/>
<g id="reservation-detail" filter="url(#shadow-md)">
  <rect x="24" y="180" width="342" height="420" rx="20" fill="#FAF9F6"/>
  <text x="44.0" y="206.8" font-family="Inter, Roboto, Arial, sans-serif" font-size="18" font-weight="700" fill="#2E5E3E">Detalle de reserva</text>
  <text x="44.0" y="236.9" font-family="Inter, Roboto, Arial, sans-serif" font-size="13" font-weight="400" fill="#2C4A4A">Hotel: Eco Lodge Selva Verde</text>
  <text x="44.0" y="260.9" font-family="Inter, Roboto, Arial, sans-serif" font-size="13" font-weight="400" fill="#2C4A4A">Habitacion: Cabana Deluxe</text>
  <text x="44.0" y="284.9" font-family="Inter, Roboto, Arial, sans-serif" font-size="13" font-weight="400" fill="#2C4A4A">Cliente: Jesus Uceda</text>
  <text x="44.0" y="308.9" font-family="Inter, Roboto, Arial, sans-serif" font-size="13" font-weight="400" fill="#2C4A4A">20/07/2026 - 23/07/2026</text>
  <text x="44.0" y="332.9" font-family="Inter, Roboto, Arial, sans-serif" font-size="13" font-weight="400" fill="#2C4A4A">Total: S/ 840</text>
  <g id="status-Pendiente">
  <rect x="44" y="348" width="103" height="26" rx="8" fill="#FDF0E4"/>
  <text x="55.0" y="357.2" font-family="Inter, Roboto, Arial, sans-serif" font-size="11" font-weight="600" fill="#E8954A">Pendiente</text>
</g>
  <g id="btn-outline-Editar">
  <rect x="44" y="400" width="90" height="44" rx="12" fill="#FAF9F6" stroke="#2E5E3E" stroke-width="1.2"/>
  <text x="89.0" y="417.3" font-family="Inter, Roboto, Arial, sans-serif" font-size="14" font-weight="600" fill="#2E5E3E" text-anchor="middle">Editar</text>
</g>
  <g id="btn-outline-Eliminar">
  <rect x="150" y="400" width="90" height="44" rx="12" fill="#FAF9F6" stroke="#2E5E3E" stroke-width="1.2"/>
  <text x="195.0" y="417.3" font-family="Inter, Roboto, Arial, sans-serif" font-size="14" font-weight="600" fill="#2E5E3E" text-anchor="middle">Eliminar</text>
</g>
  <g id="btn-Confirmar">
  <rect x="250" y="400" width="130" height="48" rx="12" fill="#2E5E3E"/>
  <text x="315.0" y="419.3" font-family="Inter, Roboto, Arial, sans-serif" font-size="14" font-weight="600" fill="#FAF9F6" text-anchor="middle">Confirmar</text>
</g>
  <g id="btn-outline-Cerrar">
  <rect x="44" y="456" width="120" height="44" rx="12" fill="#FAF9F6" stroke="#2E5E3E" stroke-width="1.2"/>
  <text x="104.0" y="473.3" font-family="Inter, Roboto, Arial, sans-serif" font-size="14" font-weight="600" fill="#2E5E3E" text-anchor="middle">Cerrar</text>
</g>
</g>
  </g>
</svg>