<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="390" height="844" viewBox="0 0 390 844" preserveAspectRatio="xMidYMid meet">
  <title>Recuperar contrasena</title>
  <defs>
    <linearGradient id="gradDrawer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E5E3E"/>
      <stop offset="100%" stop-color="#1E3D2A"/>
    </linearGradient>
    <linearGradient id="gradHero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
    <clipPath id="clipFrame"><rect width="390" height="844"/></clipPath>
    <filter id="shadow-sm" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-md" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <g id="screen">
<rect x="0" y="0" width="390" height="844" rx="0" fill="#FAF9F6"/>
<g id="top-bar">
  <rect x="0" y="0" width="390" height="64" rx="0" fill="#FAF9F6"/>
  <g transform="translate(16,24)">
    <path d="M18 4 H6 M10 0 L6 4 L10 8" stroke="#2E5E3E" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <text x="56.0" y="24.8" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700" fill="#2E5E3E">Recuperar contrasena</text>
  
</g>
<text x="195.0" y="112.4" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" fill="#2E5E3E" text-anchor="middle">Restablecer contrasena</text>
<text x="195.0" y="141.3" font-family="Inter, Roboto, Arial, sans-serif" font-size="14" font-weight="400" fill="#2C4A4A" text-anchor="middle">Te enviaremos un enlace a tu correo</text>
<g id="field-Correo electronico">
  <text x="28.0" y="178.6" font-family="Inter, Roboto, Arial, sans-serif" font-size="12" font-weight="500" fill="#2E5E3E">Correo electronico</text>
  <rect x="24" y="192" width="342" height="56" rx="12" fill="#FAF9F6" stroke="#8B5E3C" stroke-width="1.2"/>
  <text x="40.0" y="206.1" font-family="Inter, Roboto, Arial, sans-serif" font-size="16" font-weight="400" fill="#2C4A4A">tu@email.com</text>
  
</g>
<g id="btn-Enviar enlace">
  <rect x="24" y="264" width="342" height="48" rx="12" fill="#2E5E3E"/>
  <text x="195.0" y="283.3" font-family="Inter, Roboto, Arial, sans-serif" font-size="14" font-weight="600" fill="#FAF9F6" text-anchor="middle">Enviar enlace</text>
</g>
<text x="195.0" y="337.3" font-family="Inter, Roboto, Arial, sans-serif" font-size="14" font-weight="400" fill="#2E5E3E" text-anchor="middle">Volver al inicio de sesion</text>
  </g>
</svg>